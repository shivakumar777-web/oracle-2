###############################################################
#   MANTHANA — MEDICAL AI ENGINE — MASTER DOCKER COMPOSE
#   Production Grade | Single Spec | All Services
#
#   Improvements over original:
#     • Removed deprecated `version` key (Compose V2)
#     • Every depends_on uses condition: service_healthy/started
#     • Logging driver with 10 MB rotation on all services
#     • Security: read_only, no_new_privileges, cap_drop where safe
#     • Fixed LiteLLM port collision (was 11434 → now 4000)
#     • Cloud LLM: OPENROUTER_API_KEY (models: config/cloud_inference.yaml)
#     • Added Promtail for log shipping → Loki
#     • Consistent restart: unless-stopped everywhere
#     • Added expose directives for internal-only services
#     • Proper startup ordering for critical data paths
#     • Added .env variables documentation in comments
###############################################################
#
#  Required .env variables:
#    DOMAIN               — your root domain (e.g. manthana.ai)
#    ACME_EMAIL           — Let's Encrypt email
#    TRAEFIK_AUTH          — htpasswd string for Traefik dashboard
#    MEILI_MASTER_KEY     — Meilisearch admin key
#    OPENROUTER_API_KEY   — OpenRouter API key (chat, Oracle, deep research)
#    HF_TOKEN             — Hugging Face access token
#    LITELLM_MASTER_KEY   — LiteLLM proxy master key
#    SEARXNG_SECRET       — SearXNG secret key
#    GRAFANA_USER         — Grafana admin username
#    GRAFANA_PASSWORD     — Grafana admin password
#    N8N_USER             — n8n basic auth user
#    N8N_PASSWORD         — n8n basic auth password
#    N8N_ENCRYPTION_KEY   — n8n encryption key
#    FRONTEND_URL         — frontend origin for CORS (default: http://localhost:3001)
#
#  Optional .env variables:
#    OPENAI_API_KEY       — OpenAI key (for Firecrawl/Perplexica)
#    SCRAPING_BEE_API_KEY — ScrapingBee API key
#    EXTRA_CORS_ORIGINS   — comma-separated extra CORS origins
#    LOG_LEVEL            — global log level (default: INFO)
#    MAX_UPLOAD_MB        — max file upload size (default: 50)
#
###############################################################

###############################################################
#   NETWORKS
###############################################################
networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
  monitoring:
    driver: bridge

###############################################################
#   VOLUMES
###############################################################
volumes:
  traefik-certs:
  elasticsearch-data:
  qdrant-data:
  redis-data:
  meilisearch-data:
  ollama-models:
  perplexica-data:
  n8n-data:
  prometheus-data:
  grafana-data:
  loki-data:
  nutch-data:
  firecrawl-data:
  promtail-positions:
  indexer-hf-cache:
  # Phase 3: Database per service
  oracle-db-data:
  web-db-data:
  research-db-data:
  analysis-db-data:

###############################################################
#   SHARED LOGGING — JSON with 10 MB rotation, 5 files max
###############################################################
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    tag: "{{.Name}}"

###############################################################
#   SERVICES
###############################################################
services:

  ##############################################################
  # 🚪 LAYER 0: GATEWAY — Traefik
  ##############################################################
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    logging: *default-logging
    command:
      - "--api.dashboard=true"
      - "--api.insecure=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=frontend"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--certificatesresolvers.myresolver.acme.tlschallenge=true"
      - "--certificatesresolvers.myresolver.acme.email=${ACME_EMAIL}"
      - "--certificatesresolvers.myresolver.acme.storage=/letsencrypt/acme.json"
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.format=json"
      - "--metrics.prometheus=true"
      - "--metrics.prometheus.entrypoint=metrics"
      - "--entrypoints.metrics.address=:8082"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-certs:/letsencrypt
    networks:
      - frontend
      - backend
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.dashboard.rule=Host(`traefik.${DOMAIN}`)"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=myresolver"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.users=${TRAEFIK_AUTH}"
      # Global middleware: rate limit + security headers
      - "traefik.http.middlewares.security-headers.headers.browserxssfilter=true"
      - "traefik.http.middlewares.security-headers.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "traefik", "healthcheck"]
      interval: 30s
      timeout: 10s
      retries: 3

  ##############################################################
  # 🤖 LAYER 1: AI MICROSERVICES
  ##############################################################

  ai-router:
    build:
      context: ..
      dockerfile: oracle-2/services/ai-router/Dockerfile
    container_name: manthana-ai-router
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      - SERVICE_NAME=ai-router
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      # Infrastructure URLs (match config.py defaults)
      # Chat: OpenRouter (cloud). Embeddings: Ollama nomic-embed-text for Qdrant
      - EMBED_URL=http://ollama:11434
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY_2=${OPENROUTER_API_KEY_2:-}
      - CLOUD_INFERENCE_CONFIG_PATH=/app/config/cloud_inference.yaml
      - QDRANT_URL=http://qdrant:6333
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILI_MASTER_KEY}
      - MEILISEARCH_API_KEY=${MEILI_MASTER_KEY}
      - PERPLEXICA_URL=http://perplexica:3000
      - SEARXNG_URL=http://searxng:8080
      - REDIS_URL=redis://redis:6379
      # Clinical service URLs
      - ECG_URL=http://ecg:8102
      - EYE_URL=http://eye:8103
      - CANCER_URL=http://cancer:8104
      - PATHOLOGY_URL=http://pathology:8105
      - BRAIN_URL=http://brain:8106
      - SEGMENTATION_URL=http://segmentation:8107
      - NLP_URL=http://nlp:8108
      - DRUG_URL=http://drug:8109
      - AYURVEDA_URL=http://ayurveda:8110
      - IMAGING_URL=http://imaging-utils:8111
      - INDEXER_URL=http://indexer:8112
      - MANTHANA_API_URL=http://manthana-api:8001
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-50}
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - backend
      - frontend
    depends_on:
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      searxng:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ecg:
        condition: service_healthy
      eye:
        condition: service_healthy
      cancer:
        condition: service_healthy
      pathology:
        condition: service_healthy
      brain:
        condition: service_healthy
      segmentation:
        condition: service_healthy
      nlp:
        condition: service_healthy
      drug:
        condition: service_healthy
      ayurveda:
        condition: service_healthy
      imaging-utils:
        condition: service_healthy
      indexer:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-router.rule=Host(`api.${DOMAIN}`)"
      - "traefik.http.routers.ai-router.entrypoints=websecure"
      - "traefik.http.routers.ai-router.tls.certresolver=myresolver"
      - "traefik.http.routers.ai-router.middlewares=security-headers@docker"
      - "traefik.http.services.ai-router.loadbalancer.server.port=8000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  ##############################################################
  # 🧠 SECTION-SPECIFIC SERVICES (Phase 2 — Gradual Migration)
  # These will eventually replace the monolithic ai-router
  ##############################################################

  # ── Oracle Service (Chat & M5) ────────────────────────────────
  oracle-service:
    build:
      context: ..
      dockerfile: oracle-2/services/oracle-service/Dockerfile
    container_name: manthana-oracle
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      - SERVICE_NAME=oracle-service
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY_2=${OPENROUTER_API_KEY_2:-}
      - CLOUD_INFERENCE_CONFIG_PATH=/app/config/cloud_inference.yaml
      - ORACLE_REDIS_URL=redis://redis:6379
      - ORACLE_MEILISEARCH_URL=http://meilisearch:7700
      - ORACLE_MEILISEARCH_KEY=${MEILI_MASTER_KEY}
      - ORACLE_QDRANT_URL=http://qdrant:6333
      - SEARXNG_URL=http://searxng:8080
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      - REQUIRE_AUTH=${REQUIRE_AUTH:-false}
      # Phase 3: Database connection
      - DATABASE_URL=postgresql://oracle:${ORACLE_DB_PASSWORD:-oracle_dev_password}@oracle-db:5432/oracle_service
    expose:
      - "8000"
    ports:
      - "127.0.0.1:8100:8000"
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
      oracle-db:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"

  # ── Web Service (Search) ─────────────────────────────────────
  web-service:
    build:
      context: ..
      dockerfile: oracle-2/services/web-service/Dockerfile
    image: manthana-web:latest
    container_name: manthana-web
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      - SERVICE_NAME=web-service
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - WEB_SEARXNG_URL=http://searxng:8080
      - WEB_MEILISEARCH_URL=http://meilisearch:7700
      - WEB_MEILISEARCH_KEY=${MEILI_MASTER_KEY}
      - WEB_REDIS_URL=redis://redis:6379
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY_2=${OPENROUTER_API_KEY_2:-}
      - CLOUD_INFERENCE_CONFIG_PATH=/app/config/cloud_inference.yaml
      - NCBI_API_KEY=${NCBI_API_KEY:-}
      - SEMANTIC_SCHOLAR_API_KEY=${SEMANTIC_SCHOLAR_API_KEY:-}
      - OPENALEX_MAILTO=${OPENALEX_MAILTO:-}
      - CROSSREF_MAILTO=${CROSSREF_MAILTO:-}
      - CORE_API_KEY=${CORE_API_KEY:-}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      # Phase 3: Database connection
      - DATABASE_URL=postgresql://web:${WEB_DB_PASSWORD:-web_dev_password}@web-db:5432/web_service
    expose:
      - "8001"
    ports:
      - "127.0.0.1:8200:8001"
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      web-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── Research Service (Deep Research & Plagiarism) ──────────────
  research-service:
    build:
      context: ..
      dockerfile: oracle-2/services/research-service/Dockerfile
    container_name: manthana-research
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      - SERVICE_NAME=research-service
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY_2=${OPENROUTER_API_KEY_2:-}
      - CLOUD_INFERENCE_CONFIG_PATH=/app/config/cloud_inference.yaml
      - RESEARCH_REDIS_URL=redis://redis:6379
      - SEARXNG_URL=http://searxng:8080
      - RESEARCH_USE_LEGACY_RAG=${RESEARCH_USE_LEGACY_RAG:-true}
      # Phase 1 — Deep Research RAG (read-only shared infra)
      - RESEARCH_MEILISEARCH_URL=http://meilisearch:7700
      - RESEARCH_MEILISEARCH_KEY=${MEILI_MASTER_KEY:-}
      - RESEARCH_QDRANT_URL=http://qdrant:6333
      - RESEARCH_QDRANT_COLLECTION=medical_documents
      - RESEARCH_EMBED_URL=http://ollama:11434
      - RESEARCH_PERPLEXICA_URL=http://perplexica:3000
      - PERPLEXICA_URL=http://perplexica:3000
      - RESEARCH_NCBI_API_KEY=${NCBI_API_KEY:-}
      - REQUIRE_AUTH=${RESEARCH_REQUIRE_AUTH:-false}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      # Phase 3: Database connection
      - DATABASE_URL=postgresql://research:${RESEARCH_DB_PASSWORD:-research_dev_password}@research-db:5432/research_service
    expose:
      - "8002"
    ports:
      - "127.0.0.1:8201:8002"
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
      research-db:
        condition: service_healthy
    # Meilisearch, Qdrant, Ollama, Perplexica are optional RAG deps — configure URLs in env;
    # do not hard-depend (perplexica uses compose profile `perplexica`).
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.75"

  # ── Analysis Service (Image Analysis Gateway) ──────────────────
  analysis-service:
    build:
      context: .
      dockerfile: services/analysis-service/Dockerfile
    container_name: manthana-analysis
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      - SERVICE_NAME=analysis-service
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ECG_URL=http://ecg:8102
      - EYE_URL=http://eye:8103
      - CANCER_URL=http://cancer:8104
      - PATHOLOGY_URL=http://pathology:8105
      - BRAIN_URL=http://brain:8106
      - SEGMENTATION_URL=http://segmentation:8107
      - IMAGING_URL=http://imaging-utils:8111
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      - MAX_UPLOAD_MB=${MAX_UPLOAD_MB:-50}
      # Phase 3: Database connection
      - DATABASE_URL=postgresql://analysis:${ANALYSIS_DB_PASSWORD:-analysis_dev_password}@analysis-db:5432/analysis_service
    expose:
      - "8003"
    ports:
      - "127.0.0.1:8202:8003"
    networks:
      - backend
    depends_on:
      ecg:
        condition: service_healthy
      eye:
        condition: service_healthy
      cancer:
        condition: service_healthy
      analysis-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"

  # ── Clinical micro-services (8102-8112) ─────────────────────
  # All share the same structure. Template via x-clinical anchor.

  ecg:
    build:
      context: .
      dockerfile: services/ecg/Dockerfile
    container_name: manthana-ecg
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      - SERVICE_NAME=ecg
      - DEVICE=${DEVICE:-cpu}
    ports:
      - "127.0.0.1:8102:8102"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8102/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  eye:
