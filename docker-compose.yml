    container_name: manthana-drug
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      - SERVICE_NAME=drug
      - DEVICE=${DEVICE:-cpu}
    ports:
      - "127.0.0.1:8109:8109"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8109/health"]
