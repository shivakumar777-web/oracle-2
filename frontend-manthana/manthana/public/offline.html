<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#020610" />
  <title>MANTHANA — Offline</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(24px, env(safe-area-inset-top)) max(24px, env(safe-area-inset-right)) max(24px, env(safe-area-inset-bottom)) max(24px, env(safe-area-inset-left));
      font-family: system-ui, sans-serif;
      background: #020610;
      color: #ecc967;
      text-align: center;
    }
    h1 { font-size: 1rem; letter-spacing: 0.2em; text-transform: uppercase; margin: 0 0 12px; }
    p { color: rgba(245, 240, 232, 0.55); font-size: 0.95rem; line-height: 1.5; max-width: 22rem; margin: 0 auto 20px; }
    button {
      background: rgba(0, 196, 176, 0.2);
      border: 1px solid rgba(0, 196, 176, 0.45);
      color: #3ddbc8;
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      cursor: pointer;
    }
    button:active { opacity: 0.85; }
  </style>
</head>
<body>
  <div>
    <h1>You’re offline</h1>
    <p>MANTHANA needs a network connection for Oracle, Labs, and sign-in. Check your connection and try again.</p>
    <button type="button" onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
