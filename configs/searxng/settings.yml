    disabled: false
    weight: 2
    categories: videos

  - name: piped
    engine: piped
    disabled: false
    weight: 1
    categories: videos
    piped_filter: medical

outgoing:
  request_timeout: 10.0
  max_request_timeout: 20.0
  useragent_suffix: ""
  pool_connections: 100
  pool_maxsize: 20
