use_default_settings: true

server:
  secret_key: "${SEARXNG_SECRET}"
  limiter: false
  image_proxy: true
  port: 8080
  bind_address: "0.0.0.0"

ui:
  static_use_hash: true
  infinite_scroll: true
  default_theme: simple
  theme_args:
    simple_style: dark

search:
  safe_search: 0
  autocomplete: "google"
  default_lang: "en"
  default_category: "medical"
  formats:
    - html
    - json
  categories_as_tabs:
    general:
      weight: 1
    medical:
      weight: 3
    science:
      weight: 2
    images:
      weight: 1
    videos:
      weight: 1
    ayurveda:
      weight: 3
    homeopathy:
      weight: 2
    siddha:
      weight: 2
    unani:
      weight: 2
    naturopathy:
      weight: 1
    regulatory:
      weight: 2

# Premium Web: optional native engines — enable only if your SearXNG image includes them
# (check `list_engines` / docs). Examples: arxiv, openalex, crossref, base, doaj.
# Duplicate xpath entries above may still be used when a native engine is unavailable.
#
#  - name: arxiv
#    engine: arxiv
#    disabled: false
#    weight: 2
#    categories: science, medical

engines:
  - name: google
    engine: google
    disabled: false
    weight: 1

  - name: bing
    engine: bing
    disabled: false
    weight: 1

  - name: duckduckgo
    engine: duckduckgo
    disabled: false
    weight: 1

  - name: pubmed
    engine: pubmed
    disabled: false
    weight: 2
    categories: science, medical

  - name: semantic scholar
    engine: semantic_scholar
    disabled: false
    weight: 2
    categories: science, medical

  - name: google scholar
    engine: google_scholar
    disabled: false
    weight: 2
    categories: science, medical

  - name: wikipedia
    engine: wikipedia
    disabled: false
    weight: 1

  - name: wikidata
    engine: wikidata
    disabled: false
    weight: 1

  # ── CLINICAL & DRUG DATABASES ─────────────────
  - name: openreact
    engine: xpath
    url: https://www.rxlist.com/
    disabled: false
    categories: medical

  - name: drugs.com
