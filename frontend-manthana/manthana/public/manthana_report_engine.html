<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manthana Report Engine</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;600;700&family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════
   MANTHANA REPORT ENGINE — UNIVERSAL DESIGN SYSTEM
   ═══════════════════════════════════════════════════ */
:root {
  --bg-void: #020509;
  --bg-deep: #060d14;
  --bg-card: #0a1520;
  --bg-panel: #0d1c2a;
  --bg-elevated: #112233;
  --border-subtle: rgba(0,180,255,0.08);
  --border-mid: rgba(0,180,255,0.18);
  --border-accent: rgba(0,220,255,0.35);
  --cyan: #00d4ff;
  --cyan-dim: #0099bb;
  --teal: #00ffcc;
  --teal-dim: #00bb99;
  --amber: #ffb840;
  --red: #ff4d6a;
  --red-dim: #cc2244;
  --green: #00e87a;
  --green-dim: #00aa55;
  --text-primary: #e8f4ff;
  --text-secondary: #7ab3cc;
  --text-muted: #3d6678;
  --text-label: #4a8fa8;
  --severity-critical: #ff2244;
  --severity-significant: #ff8c00;
  --severity-moderate: #ffd700;
  --severity-mild: #00e87a;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg-void);
  color: var(--text-primary);
  font-family: 'IBM Plex Sans', sans-serif;
  min-height: 100vh;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; top: -20%; left: -10%; width: 60%; height: 60%;
  background: radial-gradient(ellipse, rgba(0,100,180,0.07) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
body::after {
  content: '';
  position: fixed; bottom: -20%; right: -10%; width: 50%; height: 50%;
  background: radial-gradient(ellipse, rgba(0,180,120,0.05) 0%, transparent 70%);
  pointer-events: none; z-index: 0;
}
.noise-overlay {
  position: fixed; inset: 0; opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
  background-size: 200px; pointer-events: none; z-index: 1;
}

/* ── ENGINE UI SHELL ── */
.engine-shell {
  position: relative; z-index: 2;
  max-width: 1100px; margin: 0 auto; padding: 32px 24px 80px;
}

.engine-header {
  display: flex; justify-content: space-between; align-items: flex-start;
  padding: 0 0 28px; border-bottom: 1px solid var(--border-mid); margin-bottom: 28px;
  flex-wrap: wrap; gap: 16px;
}
.engine-header-actions {
  display: flex; flex-wrap: wrap; align-items: center; gap: 10px;
  justify-content: flex-end; max-width: 100%;
}
.engine-header-actions .btn-oracle:disabled {
  opacity: 0.4; cursor: not-allowed;
}
.wa-icon-btn {
  display: inline-flex; align-items: center; justify-content: center;
  width: 40px; height: 40px; border-radius: 10px;
  border: 1px solid rgba(37, 211, 102, 0.35);
  background: rgba(37, 211, 102, 0.08);
  color: #25d366; cursor: default;
  flex-shrink: 0;
}
.modality-picker.modality-locked {
  pointer-events: none; opacity: 0.88;
  position: relative;
}
.modality-picker.modality-locked::after {
  content: 'Locked'; position: absolute; top: 8px; right: 8px;
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 1px;
  text-transform: uppercase; color: var(--cyan); background: rgba(0,20,40,0.85);
  padding: 4px 8px; border-radius: 4px; border: 1px solid rgba(0,212,255,0.3);
  pointer-events: none;
}
.engine-brand .brand-title {
  font-family: 'Syne', sans-serif; font-size: 26px; font-weight: 800;
  color: var(--text-primary); letter-spacing: -0.5px;
}
.engine-brand .brand-title span { color: var(--cyan); }
.engine-brand .brand-sub {
  font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text-label);
  letter-spacing: 2px; text-transform: uppercase; margin-top: 4px;
}
.engine-status {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; border-radius: 20px;
  border: 1px solid rgba(0,232,122,0.3); background: rgba(0,232,122,0.06);
}
.status-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green); box-shadow: 0 0 8px var(--green);
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.6;transform:scale(.8)} }
.status-text { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--green); letter-spacing: 1px; text-transform: uppercase; }

.engine-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media(max-width: 800px) { .engine-layout { grid-template-columns: 1fr; } }

.panel {
  background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: 12px; overflow: hidden;
}
.panel-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px; border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-panel);
}
.panel-title {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-label);
}
.panel-badge {
  font-family: 'DM Mono', monospace; font-size: 9px;
  padding: 2px 8px; border-radius: 3px;
  background: rgba(0,212,255,0.08); border: 1px solid rgba(0,212,255,0.2);
  color: var(--cyan-dim); letter-spacing: 1px;
}
.panel-body { padding: 16px 18px; }

textarea#jsonInput {
  width: 100%; min-height: 200px; height: min(42vh, 420px); resize: vertical;
  background: #030c15; border: 1px solid var(--border-subtle); border-radius: 8px;
  color: #7dffb0; font-family: 'DM Mono', monospace; font-size: 11px;
  line-height: 1.7; padding: 14px; outline: none;
  transition: border-color 0.2s;
}
textarea#jsonInput:focus { border-color: var(--border-accent); }

.engine-controls { display: flex; gap: 10px; margin-top: 12px; flex-wrap: wrap; }

.btn {
  font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700;
  letter-spacing: 1.5px; text-transform: uppercase;
  padding: 9px 20px; border-radius: 6px; border: 1px solid;
  cursor: pointer; transition: all 0.15s;
}
.btn-primary {
  background: rgba(0,212,255,0.12); border-color: rgba(0,212,255,0.4);
  color: var(--cyan);
}
.btn-primary:hover { background: rgba(0,212,255,0.2); border-color: var(--cyan); }
.btn-secondary {
  background: rgba(0,255,204,0.06); border-color: rgba(0,255,204,0.2);
  color: var(--teal-dim);
}
.btn-secondary:hover { background: rgba(0,255,204,0.12); }
.btn-ghost {
  background: transparent; border-color: var(--border-subtle);
  color: var(--text-muted);
}
.btn-ghost:hover { border-color: var(--border-mid); color: var(--text-secondary); }

.modality-picker {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
  gap: 6px; max-height: 420px; overflow-y: auto; padding-right: 4px;
}
.modality-picker::-webkit-scrollbar { width: 4px; }
.modality-picker::-webkit-scrollbar-track { background: transparent; }
.modality-picker::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 4px; }

.mod-btn {
  font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.5px;
  padding: 7px 10px; border-radius: 5px; cursor: pointer;
  background: var(--bg-panel); border: 1px solid var(--border-subtle);
  color: var(--text-muted); transition: all 0.15s; text-align: left;
}
.mod-btn:hover { border-color: var(--border-mid); color: var(--text-secondary); }
.mod-btn.active { background: rgba(0,212,255,0.1); border-color: rgba(0,212,255,0.35); color: var(--cyan); }
.mod-group-label {
  font-family: 'DM Mono', monospace; font-size: 8px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--text-muted); padding: 8px 4px 4px;
  grid-column: 1/-1; border-bottom: 1px solid var(--border-subtle); margin-bottom: 2px;
}

/* preview iframe */
#previewFrame {
  width: 100%; min-height: 280px; height: min(70vh, 560px); border: none; border-radius: 8px;
  background: var(--bg-void);
}
.preview-placeholder {
  min-height: 240px; height: min(50vh, 420px); display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 14px;
  color: var(--text-muted);
}
.preview-placeholder .ph-icon { font-size: 32px; opacity: 0.3; }
.preview-placeholder p { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 1.5px; text-transform: uppercase; }

.error-toast {
  display: none; background: rgba(255,45,80,0.1); border: 1px solid rgba(255,45,80,0.3);
  border-radius: 8px; padding: 12px 16px; margin-top: 12px;
  font-family: 'DM Mono', monospace; font-size: 11px; color: var(--red);
  line-height: 1.6;
}

.full-preview-area { grid-column: 1/-1; }

/* ── REPORT OUTPUT STYLES (used inside iframe) ── */
/* These get injected into the generated report */
</style>
</head>

let selectedModality = null;
let modalityLocked = false;
/** Labs → engine session (includes oracleHandoff for Oracle button) */
let oracleHandoffFromLabs = null;
const MANTHANA_REPORT_ENGINE_STORAGE_KEY = 'manthana_report_engine_v1';
const MANTHANA_REPORT_ENGINE_HANDOFF_PREFIX = 'manthana_report_engine_handoff_';

/* ──────────────────────────────────────────────
   BUILD MODALITY PICKER UI
   ────────────────────────────────────────────── */
function buildModalityPicker() {
  const container = document.getElementById('modalityPicker');
  container.classList.toggle('modality-locked', modalityLocked);
  container.innerHTML = '';
  MODALITIES.forEach(group => {
    const lbl = document.createElement('div');
    lbl.className = 'mod-group-label';
    lbl.textContent = group.group;
    container.appendChild(lbl);
    group.items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'mod-btn';
      btn.textContent = item.label;
      btn.dataset.key = item.key;
      btn.onclick = () => {
        if (modalityLocked) return;
        document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedModality = item.key;
        loadSampleForModality(item.key, item.label);
      };
      container.appendChild(btn);
    });
  });
}

function loadSample() {
  const key = selectedModality || "shoulder_mri";
  const label = selectedModality
    ? MODALITIES.flatMap(g => g.items).find(i => i.key === key)?.label || key
    : "Shoulder MRI";
  loadSampleForModality(key, label);
}

/* ──────────────────────────────────────────────
   REPORT RENDERER
   Converts JSON → full standalone HTML string
   ────────────────────────────────────────────── */
function renderReport(data) {
  const m = data.report_meta || {};
  const p = data.patient || {};
  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  const severityMap = {
    critical: 'severity-critical', significant: 'severity-significant',
    moderate: 'severity-moderate', mild: 'severity-mild', normal: 'severity-mild'
  };
  const pillMap = {
    critical: 'critical', significant: 'significant',
    moderate: 'moderate', mild: 'mild', normal: 'mild'
  };
  const statusMap = {
    normal: 'status-normal', abnormal: 'status-abnormal', borderline: 'status-borderline'
  };

  /* Section counter */
  let sec = 0;
  function sectionHeader(title) {
    sec++;
    return `
    <div class="section-header">
      <span class="section-number">§${String(sec).padStart(2,'0')}</span>
      <span class="section-title">${title}</span>
      <div class="section-line"></div>
    </div>`;
  }

  /* Findings */
  const findings = (data.findings || []).map(f => `
  <div class="finding-card ${severityMap[f.severity] || ''}">
    <div class="finding-header">
      <div class="finding-title">${f.title || ''}</div>
      ${f.severity ? `<span class="severity-pill ${pillMap[f.severity] || ''}">${f.severity}</span>` : ''}
    </div>
    <div class="finding-body">${f.body || ''}</div>
  </div>`).join('');

  /* Measurements */
  let measureHTML = '';
  if (data.measurements && data.measurements.length) {
    const rows = data.measurements.map(r => `
      <tr>
        <td>${r.structure || ''}</td>
        <td>${r.finding || ''}</td>
        <td>${r.normal || ''}</td>
        <td><span class="${statusMap[r.status] || ''}">${r.status || ''}</span></td>
      </tr>`).join('');
    measureHTML = `
    <div style="background:var(--bg-panel);border:1px solid var(--border-subtle);border-radius:10px;padding:16px;overflow-x:auto;">
      <table class="measure-table">
        <thead><tr>
          <th>Structure / Parameter</th><th>Finding</th><th>Normal Range</th><th>Status</th>
        </tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  }

  /* Differential */
  const diffs = (data.differential_diagnosis || []).map(d => `
  <div class="diff-row">
    <div class="diff-rank">${d.rank}.</div>
    <div class="diff-name">${d.name || ''}${d.detail ? `<br><span style="font-size:11px;color:var(--text-muted)">${d.detail}</span>` : ''}</div>
    <div class="diff-prob-bar"><div class="diff-prob-fill" style="width:${d.probability || 0}%"></div></div>
    <div class="diff-prob-text">${d.probability || 0}%</div>
  </div>`).join('');

  /* Impression */
  const imp = data.impression || {};
  const impPoints = (imp.points || []).map((pt, i) => `
    <li>
      <span class="imp-num">${String(i+1).padStart(2,'0')}.</span>
      <span>${pt}</span>
    </li>`).join('');

  /* Recommendations */
  const recos = (data.recommendations || []).map(r => `
  <div class="reco-card">
    <div class="reco-icon">${r.icon || '📋'}</div>
    <div class="reco-title">${r.title || ''}</div>
    <div class="reco-text">${r.text || ''}</div>
  </div>`).join('');

  /* Educational note */
  let eduHTML = '';
  if (data.educational_note) {
    const en = data.educational_note;
    const items = (en.items || []).map(it => `
      <div>
        <div style="font-size:12px;font-weight:600;color:var(--text-primary);margin-bottom:6px;">${it.heading || ''}</div>
        <div style="font-size:11px;color:var(--text-secondary);line-height:1.7;">${it.text || ''}</div>
      </div>`).join('');
    eduHTML = `
    <div class="section">
      ${sectionHeader(en.title || 'Educational Annotation')}
      <div style="background:var(--bg-panel);border:1px solid var(--border-subtle);border-radius:10px;padding:20px;">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px;">${items}</div>
      </div>
    </div>`;
  }

  /* Dynamic AI sections (modality-specific) */
  let dynamicSectionsHTML = '';
  const dynList = (data.dynamic_sections || []).slice(0, 5);
  if (dynList.length) {
    function dynEmphasisBorder(e) {
      if (e === 'clinical') return 'rgba(255,184,64,0.45)';
      if (e === 'technical') return 'rgba(0,255,204,0.35)';
      return 'rgba(0,212,255,0.35)';
    }
    const dynCards = dynList.map(function (s) {
      var raw = String(s.body || '');
      var body = raw.length > 1500 ? raw.slice(0, 1500) + '…' : raw;
      var eb = dynEmphasisBorder(s.emphasis);
      return (
        '<div class="finding-card" style="border-left:3px solid ' + eb + ';margin-bottom:12px;">' +
        '<div class="finding-title">' + esc(s.title || '') + '</div>' +
        '<div class="finding-body" style="white-space:pre-wrap;margin-top:8px;">' + esc(body) + '</div>' +
        '</div>'
      );
    }).join('');
    dynamicSectionsHTML =
      '<div class="section">' +
      sectionHeader('Clinical intelligence') +
      dynCards +
      '</div>';
  }

  /* Technique */
  const techItems = (data.technique || []).map(t => `
  <div class="tech-item">
    <div class="tech-label">${t.label || ''}</div>
    <div class="tech-value">${t.value || ''}</div>
  </div>`).join('');

  /* Source examination image */
  const sm = data.source_media;
  let sourceMediaHTML = '';
  if (sm && sm.kind === 'image' && sm.data_url) {
    const cap = esc(sm.caption || 'Examination image');
    const alt = esc(sm.alt || 'Study image');
    const safeSrc = String(sm.data_url).replace(/"/g, '&quot;');
    sourceMediaHTML = `
  <div class="section">
    ${sectionHeader('Examination image')}
    <div style="background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:12px;padding:16px;overflow:hidden;max-width:100%;">
      <img src="${safeSrc}" alt="${alt}" style="display:block;width:100%;max-height:min(70vh,560px);height:auto;object-fit:contain;border-radius:8px;" />
      <div style="font-size:11px;color:var(--text-muted);margin-top:12px;line-height:1.5;">${cap}</div>
    </div>
  </div>`;
  }

  /* Critical banner */
  const critBanner = data.critical_alert ? `
  <div class="critical-banner">
    <div class="critical-icon">⚠️</div>
    <div class="critical-text">
      <div class="critical-title">${data.critical_alert.title || 'Critical Finding'}</div>
      <div class="critical-desc">${data.critical_alert.description || ''}</div>
    </div>
  </div>` : '';

  /* Confidence color */
  const confColor = {High: '#00e87a', Moderate: '#ffb840', Low: '#ff4d6a'}[m.confidence] || '#00e87a';

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manthana Labs — ${m.report_type || 'Radiology Report'}</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Playfair+Display:wght@400;600;700&family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>

.reco-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.reco-card{background:var(--bg-panel);border:1px solid var(--border-subtle);border-radius:10px;padding:16px 18px}
.reco-icon{font-size:18px;margin-bottom:8px}
.reco-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;color:var(--text-primary);margin-bottom:6px;letter-spacing:.5px}
.reco-text{font-size:11px;color:var(--text-secondary);line-height:1.6}
.diff-row{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border-subtle)}
.diff-row:last-child{border-bottom:none}
.diff-rank{font-family:'DM Mono',monospace;font-size:11px;color:var(--text-muted);width:20px;flex-shrink:0}
.diff-name{flex:1;font-size:13px;color:var(--text-primary);font-weight:500}
.diff-prob-bar{width:100px;height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;flex-shrink:0}
.diff-prob-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--cyan),var(--teal))}
.diff-prob-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--cyan);width:36px;text-align:right;flex-shrink:0}
.radiologist-footer{margin-top:48px;padding-top:24px;border-top:1px solid var(--border-subtle);display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:20px}
.sig-label{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;color:var(--text-muted);text-transform:uppercase;margin-bottom:6px}
.sig-name{font-family:'Playfair Display',serif;font-size:18px;color:var(--cyan);font-style:italic}
.sig-cred{font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted);margin-top:3px}
.disclaimer-box{max-width:420px;background:rgba(255,140,0,.05);border:1px solid rgba(255,140,0,.15);border-radius:8px;padding:14px 16px}
.disclaimer-title{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--amber);margin-bottom:6px}
.disclaimer-text{font-size:10px;color:rgba(200,150,80,.7);line-height:1.6}
@media print{body{background:#fff!important;color:#000!important}.noise-overlay,.radiologist-footer .disclaimer-box{display:none}}
</style>
</head>
<body>
<div class="noise-overlay"></div>
<div class="wrapper">

  <!-- ══ HEADER ══ -->
  <div class="report-header">
    <div class="brand-block">
      <div class="brand-title">Manthana <span>Labs</span></div>
      <div class="brand-subtitle">AI Radiology · Medical Intelligence Platform</div>
      <div class="brand-model-tags">
        ${m.model1 ? `<span class="model-tag">${m.model1}</span>` : ''}
        ${m.model2 ? `<span class="model-tag secondary">${m.model2}</span>` : ''}
        ${m.cost ? `<span class="model-tag secondary">${m.cost}</span>` : ''}
      </div>
    </div>
    <div class="report-meta-block">
      <div class="report-type-label">${m.report_type || 'Medical Report'}</div>
      <div class="report-id">${m.report_id || ''}</div>
      <div class="report-date">${m.report_date || ''}</div>
      ${m.confidence ? `
      <div class="confidence-badge" style="border-color:${confColor}33;background:${confColor}0D;">
        <div class="confidence-dot" style="background:${confColor};box-shadow:0 0 8px ${confColor}"></div>
        <span class="confidence-text" style="color:${confColor}">Confidence ${m.confidence_score || m.confidence}</span>
      </div>` : ''}
    </div>
  </div>

  <!-- ══ PATIENT CARD ══ -->
  ${p.name ? `
  <div class="patient-card">
    <div class="patient-field">
      <div class="patient-field-label">Patient Name</div>
      <div class="patient-field-value highlight">${p.name}</div>
    </div>
    ${p.age ? `<div class="patient-field"><div class="patient-field-label">Age / Sex</div><div class="patient-field-value">${p.age}${p.sex ? ` · ${p.sex}` : ''}</div></div>` : ''}
    ${p.id ? `<div class="patient-field"><div class="patient-field-label">Patient ID</div><div class="patient-field-value">${p.id}</div></div>` : ''}
    ${p.referring_doctor ? `<div class="patient-field"><div class="patient-field-label">Referring</div><div class="patient-field-value">${p.referring_doctor}</div></div>` : ''}
    ${p.clinical_history ? `<div class="patient-field" style="grid-column:1/-1"><div class="patient-field-label">Clinical History</div><div class="patient-field-value" style="font-size:12px;font-weight:400;color:var(--text-secondary)">${p.clinical_history}</div></div>` : ''}
  </div>` : ''}

  ${sourceMediaHTML}

  <!-- ══ CRITICAL ALERT ══ -->
  ${critBanner}

  <!-- ══ §01 TECHNIQUE ══ -->
  ${data.technique && data.technique.length ? `
  <div class="section">
    ${sectionHeader('Examination Technique')}
    <div class="technique-grid">${techItems}</div>
  </div>` : ''}

  <!-- ══ §02 FINDINGS ══ -->
  ${findings ? `
  <div class="section">
    ${sectionHeader('Radiological Findings')}
    ${findings}
  </div>` : ''}

  <!-- ══ §03 MEASUREMENTS ══ -->
  ${measureHTML ? `
  <div class="section">
    ${sectionHeader('Measurements & Structured Assessment')}
    ${measureHTML}
  </div>` : ''}

  <!-- ══ §04 DIFFERENTIAL ══ -->
  ${diffs ? `
  <div class="section">
    ${sectionHeader('Differential Diagnosis')}
    <div style="background:var(--bg-card);border:1px solid var(--border-subtle);border-radius:10px;padding:18px 20px;">
      ${diffs}
    </div>
  </div>` : ''}

  <!-- ══ §05 IMPRESSION ══ -->
  ${imp.primary_diagnosis ? `
  <div class="section">
    ${sectionHeader('Radiological Impression')}
    <div class="impression-box">
      <div class="impression-label">Primary Diagnosis</div>
      <div class="impression-diagnosis">${imp.primary_diagnosis}</div>
      ${impPoints ? `<ul class="impression-points">${impPoints}</ul>` : ''}
    </div>
  </div>` : ''}

  <!-- ══ §06 RECOMMENDATIONS ══ -->
  ${recos ? `
  <div class="section">
    ${sectionHeader('Clinical Recommendations')}
    <div class="reco-grid">${recos}</div>
  </div>` : ''}

  <!-- ══ §07 EDUCATIONAL NOTE ══ -->
  ${eduHTML}

  <!-- ══ DYNAMIC AI SECTIONS ══ -->
  ${dynamicSectionsHTML}

  <!-- ══ FOOTER ══ -->
  <div class="radiologist-footer">
    <div class="sig-block">
      <div class="sig-label">AI Radiologist · Copilot</div>
      <div class="sig-name">Manthana Med Vision v2</div>
      <div class="sig-cred">Augmented by ${m.model1 || 'AI Model'} · ${m.report_date || new Date().toLocaleDateString()}</div>
    </div>
    <div class="disclaimer-box">
      <div class="disclaimer-title">⚠ Educational Research Use Only</div>
      <div class="disclaimer-text">This report is generated for radiology education and AI research purposes. It does not constitute a formal radiological diagnosis and must not be used for clinical decision-making without review by a licensed radiologist.</div>
    </div>
  </div>

</div>
</body>
</html>`;
}

/* ──────────────────────────────────────────────
   UI FUNCTIONS
   ────────────────────────────────────────────── */
let lastReportHTML = '';

function setOracleButtonEnabled(on) {
  const btn = document.getElementById('btnOracle');
  if (!btn) return;
  btn.disabled = !on;
  btn.setAttribute('aria-disabled', String(!on));
  btn.title = on ? 'Open Manthana Oracle with this report' : 'Available after the report renders';
}

function openOracleFromEngine() {
  try {
    if (!oracleHandoffFromLabs || !oracleHandoffFromLabs.reportMarkdown) {
      const raw = sessionStorage.getItem(MANTHANA_REPORT_ENGINE_STORAGE_KEY);
      if (raw) {
        const sess = JSON.parse(raw);
        if (sess && sess.oracleHandoff) oracleHandoffFromLabs = sess.oracleHandoff;
      }
    }
    if (!oracleHandoffFromLabs || !oracleHandoffFromLabs.reportMarkdown) return;
    sessionStorage.setItem(ORACLE_LABS_HANDOFF_STORAGE_KEY, JSON.stringify(oracleHandoffFromLabs));
    const u = new URL('/', window.location.origin);
    u.searchParams.set('mode', 'm5');
    u.searchParams.set('domain', 'm5');
    u.searchParams.set('labsHandoff', '1');
    window.open(u.toString(), '_blank', 'noopener,noreferrer');
  } catch (e) {
    console.error(e);
  }
}

function generateReport() {
  const raw = document.getElementById('jsonInput').value.trim();
  const toast = document.getElementById('errorToast');
  const badge = document.getElementById('previewBadge');

  if (!raw) {
    showError('No JSON input. Click a modality to load a sample or paste your AI output.');
    return;
  }

  let data;
  try {
    // Strip markdown code fences if present
    const clean = raw.replace(/^```(?:json)?\s*/i, '').replace(/\s*```$/,'').trim();
    data = JSON.parse(clean);
  } catch(e) {
    showError(`JSON Parse Error: ${e.message}\n\nMake sure the AI output is valid JSON. Strip any markdown code fences.`);
    return;
  }

  toast.style.display = 'none';
  lastReportHTML = renderReport(data);

  const placeholder = document.getElementById('previewPlaceholder');
  const frame = document.getElementById('previewFrame');
  placeholder.style.display = 'none';
  frame.style.display = 'block';
  frame.style.height = '600px';

  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open(); doc.write(lastReportHTML); doc.close();

  badge.textContent = data.report_meta?.report_type || data.modality_key || 'Report';

  const canOracle = !!(oracleHandoffFromLabs && oracleHandoffFromLabs.reportMarkdown);
  setOracleButtonEnabled(canOracle);
}

function downloadReport() {
  if (!lastReportHTML) { generateReport(); }
  if (!lastReportHTML) return;
  const blob = new Blob([lastReportHTML], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `manthana_report_${Date.now()}.html`;
  a.click();
}

function showError(msg) {
  const toast = document.getElementById('errorToast');
  toast.textContent = msg;
  toast.style.display = 'block';
}

function clearAll() {
  document.getElementById('jsonInput').value = '';
  document.getElementById('jsonStatus').textContent = 'Awaiting Input';
  document.getElementById('errorToast').style.display = 'none';
  document.getElementById('previewPlaceholder').style.display = 'flex';
  document.getElementById('previewFrame').style.display = 'none';
  document.getElementById('previewBadge').textContent = 'No Report';
  document.querySelectorAll('.mod-btn').forEach(b => b.classList.remove('active'));
  selectedModality = null;
  lastReportHTML = '';
  modalityLocked = false;
  oracleHandoffFromLabs = null;
  buildModalityPicker();
  setOracleButtonEnabled(false);
}

function stripHandoffQueryFromUrl() {
  try {
    const u = new URL(window.location.href);
    if (!u.searchParams.has('handoff') && !u.searchParams.has('pm')) return;
    u.searchParams.delete('handoff');
    u.searchParams.delete('pm');
    const clean = u.pathname + (u.search || '') + u.hash;
    history.replaceState(null, '', clean);
  } catch (e) {
    console.error('stripHandoffQueryFromUrl', e);
  }
}

/** Labs writes sessionStorage in the opener tab; a new tab does NOT see it — prefer ?handoff= + localStorage. */
function readLabsSessionPayload() {
  try {
    const params = new URLSearchParams(window.location.search);
    const handoff = params.get('handoff');
    if (handoff) {
      const key = MANTHANA_REPORT_ENGINE_HANDOFF_PREFIX + handoff;
      const raw = localStorage.getItem(key);
      if (raw) {
        try {
          localStorage.removeItem(key);
        } catch (e) {
          /* ignore */
        }
        return JSON.parse(raw);
      }
    }
    const raw = sessionStorage.getItem(MANTHANA_REPORT_ENGINE_STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {
    console.error('readLabsSessionPayload', e);
  }
  return null;
}

function applyLabsSession(sess) {
  if (!sess || !sess.enginePayload) return false;
  modalityLocked = true;
  oracleHandoffFromLabs = sess.oracleHandoff || null;
  const ep = sess.enginePayload || {};
  const mk = sess.modalityKey || ep.modality_key || null;
  selectedModality = mk;
  document.getElementById('jsonInput').value = JSON.stringify(sess.enginePayload, null, 2);
  document.getElementById('jsonStatus').textContent = sess.modalityLabel || mk || 'Labs';
  buildModalityPicker();
  if (mk) {
    const sel = '.mod-btn[data-key="' + String(mk).replace(/\\/g, '\\\\').replace(/"/g, '\\"') + '"]';
    const btn = document.querySelector(sel);
    if (btn) {
      document.querySelectorAll('.mod-btn').forEach(function (b) {
        b.classList.remove('active');
      });
      btn.classList.add('active');
    }
  }
  generateReport();
  return true;
}

function initFromLabsSession() {
  try {
    const sess = readLabsSessionPayload();
    if (!sess) return;
    if (applyLabsSession(sess)) {
      stripHandoffQueryFromUrl();
    }
  } catch (e) {
    console.error('initFromLabsSession', e);
  }
}

/** When localStorage is blocked, the opener delivers the payload via postMessage (?pm=1). */
function installPostMessageHandoff() {
  const p = new URLSearchParams(window.location.search);
  if (p.get('pm') !== '1') return;
  function onMsg(ev) {
    if (ev.origin !== window.location.origin) return;
    if (!ev.data || ev.data.type !== 'manthana_report_engine_v1' || !ev.data.payload) return;
    window.removeEventListener('message', onMsg);
    if (applyLabsSession(ev.data.payload)) {
      stripHandoffQueryFromUrl();
    }
  }
  window.addEventListener('message', onMsg);
}

// Init
buildModalityPicker();
document.getElementById('btnOracle').addEventListener('click', openOracleFromEngine);
installPostMessageHandoff();
initFromLabsSession();
</script>
</body>
</html>
