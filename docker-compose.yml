    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8110/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  imaging-utils:
    build:
      context: .
      dockerfile: services/imaging-utils/Dockerfile
    container_name: manthana-imaging-utils
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      - SERVICE_NAME=imaging-utils
    ports:
      - "127.0.0.1:8111:8111"
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8111/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  indexer:
    build:
      context: .
      dockerfile: services/indexer/Dockerfile
    container_name: manthana-indexer
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      - SERVICE_NAME=indexer
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILISEARCH_KEY=${MEILI_MASTER_KEY}
      - QDRANT_URL=http://qdrant:6333
      - EMBED_URL=http://ollama:11434
      - HF_HOME=/app/hf_cache
    ports:
      - "127.0.0.1:8112:8112"
    volumes:
      - indexer-hf-cache:/app/hf_cache
    networks:
      - backend
    depends_on:
      meilisearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      ollama:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8112/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  ##############################################################
  # 🕷️ LAYER 2: CRAWLERS
  ##############################################################

  crawl4ai:
    image: unclecode/crawl4ai:latest
    container_name: crawl4ai
    restart: unless-stopped
    logging: *default-logging
    environment:
      - MAX_CONCURRENT_TASKS=10
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "127.0.0.1:11235:11235"
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11235/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  firecrawl-api:
    profiles:
      - crawlers
    build:
      context: ./crawlers/firecrawl
      dockerfile: apps/api/Dockerfile
    container_name: firecrawl-api
    restart: unless-stopped
    logging: *default-logging
    environment:
      - REDIS_URL=redis://redis:6379
      - REDIS_RATE_LIMIT_URL=redis://redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://firecrawl-playwright:3000
      - USE_DB_AUTHENTICATION=false
      - PORT=3002
      - NUM_WORKERS_PER_QUEUE=8
      - OPENAI_API_KEY=${OPENAI_API_KEY:-dummy}
      - SCRAPING_BEE_API_KEY=${SCRAPING_BEE_API_KEY:-}
      - HOST=0.0.0.0
      - SELF_HOSTED_WEBHOOK_URL=http://firecrawl-api:3002
    ports:
      - "127.0.0.1:3002:3002"
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3002/", "-o", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  firecrawl-worker:
    profiles:
      - crawlers
    build:
      context: ./crawlers/firecrawl
      dockerfile: apps/api/Dockerfile
    container_name: firecrawl-worker
    restart: unless-stopped
    logging: *default-logging
    environment:
      - REDIS_URL=redis://redis:6379
      - PLAYWRIGHT_MICROSERVICE_URL=http://firecrawl-playwright:3000
      - USE_DB_AUTHENTICATION=false
      - NUM_WORKERS_PER_QUEUE=8
    entrypoint: ["pnpm", "run", "workers"]
    networks:
      - backend
    depends_on:
      redis:
        condition: service_healthy
      firecrawl-playwright:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"

  firecrawl-playwright:
    profiles:
      - crawlers
    image: browserless/chrome:latest
    container_name: firecrawl-playwright
    restart: unless-stopped
    logging: *default-logging
    environment:
      - DEFAULT_LAUNCH_ARGS=["--no-sandbox","--disable-dev-shm-usage"]
      - CONCURRENT=10
      - TIMEOUT=30000
    networks:
      - backend
    # Internal only — no published ports
    expose:
      - "3000"
    tmpfs:
      - /tmp:size=256M
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  manthana-api:
    build:
      context: ..
      dockerfile: oracle-2/Dockerfile.api
    container_name: manthana-api
    restart: unless-stopped
    logging: *default-logging
    env_file: .env
    environment:
      - SERVICE_NAME=manthana-api
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SEARXNG_URL=http://searxng:8080
      - FIRECRAWL_URL=http://firecrawl-api:3002
      - CRAWL4AI_URL=http://crawl4ai:11235
      - OLLAMA_URL=http://ollama:11434
      - QDRANT_URL=http://qdrant:6333
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - MEILISEARCH_URL=http://meilisearch:7700
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - EMBEDDING_MODEL=nomic-embed-text
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_API_KEY_2=${OPENROUTER_API_KEY_2:-}
      - CLOUD_INFERENCE_CONFIG_PATH=/app/config/cloud_inference.yaml
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3001}
      - EXTRA_CORS_ORIGINS=${EXTRA_CORS_ORIGINS:-}
    ports:
      - "127.0.0.1:8001:8001"
    networks:
      - backend
      - frontend
    depends_on:
      elasticsearch:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
      ollama:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.manthana-api.rule=Host(`search.api.${DOMAIN}`)"
      - "traefik.http.routers.manthana-api.entrypoints=websecure"
      - "traefik.http.routers.manthana-api.tls.certresolver=myresolver"
      - "traefik.http.routers.manthana-api.middlewares=security-headers@docker"
      - "traefik.http.services.manthana-api.loadbalancer.server.port=8001"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  nutch:
    profiles:
      - crawlers
    build:
      context: ./crawlers/nutch
      dockerfile: Dockerfile
    container_name: nutch
    restart: unless-stopped
    logging: *default-logging
    volumes:
      - nutch-data:/nutch/crawl
      - ./seeds:/nutch/urls:ro
      - ./configs/nutch-site.xml:/nutch/conf/nutch-site.xml:ro
    environment:
      - ELASTICSEARCH_HOST=elasticsearch
      - ELASTICSEARCH_PORT=9200
    networks:
      - backend
    depends_on:
      elasticsearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  ##############################################################
  # 🗄️ LAYER 3: STORAGE & INDEX
  ##############################################################

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: elasticsearch
    restart: unless-stopped
    logging: *default-logging
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.monitoring.templates.enabled=false
      - xpack.ml.enabled=false
      - xpack.watcher.enabled=false
      - xpack.graph.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
      - cluster.name=medical-search
      - bootstrap.memory_lock=false
    ports:
      - "127.0.0.1:9200:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    networks:
      - backend
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:9200/_cluster/health?wait_for_status=yellow&timeout=5s"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    logging: *default-logging
    environment:
      - QDRANT__SERVICE__HTTP_PORT=6333
      - QDRANT__SERVICE__GRPC_PORT=6334
      - QDRANT__LOG_LEVEL=INFO
      - QDRANT__STORAGE__WAL__WAL_CAPACITY_MB=64
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    logging: *default-logging
    command: >
      redis-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --appendonly yes
      --tcp-backlog 128
      --loglevel notice
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  ##############################################################
  # 🗄️ LAYER 3B: PER-SERVICE DATABASES (Phase 3)
  # PostgreSQL instances for service data isolation
  ##############################################################

  # ── Oracle Database ───────────────────────────────────────────
  oracle-db:
    image: postgres:15-alpine
    container_name: oracle-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      - POSTGRES_USER=oracle
      - POSTGRES_PASSWORD=${ORACLE_DB_PASSWORD:-oracle_dev_password}
      - POSTGRES_DB=oracle_service
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - oracle-db-data:/var/lib/postgresql/data
    networks:
      - backend
    expose:
      - "5432"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oracle -d oracle_service"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Web Database ───────────────────────────────────────────────
  web-db:
    image: postgres:15-alpine
    container_name: web-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      - POSTGRES_USER=web
      - POSTGRES_PASSWORD=${WEB_DB_PASSWORD:-web_dev_password}
      - POSTGRES_DB=web_service
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - web-db-data:/var/lib/postgresql/data
    networks:
      - backend
    expose:
      - "5432"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U web -d web_service"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Research Database ────────────────────────────────────────
  research-db:
    image: postgres:15-alpine
    container_name: research-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      - POSTGRES_USER=research
      - POSTGRES_PASSWORD=${RESEARCH_DB_PASSWORD:-research_dev_password}
      - POSTGRES_DB=research_service
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - research-db-data:/var/lib/postgresql/data
    networks:
      - backend
    expose:
      - "5432"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research_service"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Analysis Database ─────────────────────────────────────────
  analysis-db:
    image: postgres:15-alpine
    container_name: analysis-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      - POSTGRES_USER=analysis
      - POSTGRES_PASSWORD=${ANALYSIS_DB_PASSWORD:-analysis_dev_password}
      - POSTGRES_DB=analysis_service
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - analysis-db-data:/var/lib/postgresql/data
    networks:
      - backend
    expose:
      - "5432"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U analysis -d analysis_service"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ##############################################################
  # 🔍 LAYER 4: SEARCH ENGINES
  ##############################################################

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    restart: unless-stopped
    logging: *default-logging
    environment:
      - SEARXNG_BASE_URL=https://search.${DOMAIN}
      - SEARXNG_SECRET_KEY=${SEARXNG_SECRET}
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - ./configs/searxng:/etc/searxng:rw
    networks:
      - backend
      - frontend
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.searxng.rule=Host(`search.${DOMAIN}`)"
      - "traefik.http.routers.searxng.entrypoints=websecure"
      - "traefik.http.routers.searxng.tls.certresolver=myresolver"
      - "traefik.http.routers.searxng.middlewares=security-headers@docker"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:latest
    container_name: meilisearch
    restart: unless-stopped
    logging: *default-logging
    environment:
      - MEILI_MASTER_KEY=${MEILI_MASTER_KEY}
      - MEILI_ENV=production
      - MEILI_LOG_LEVEL=INFO
      - MEILI_MAX_INDEXING_MEMORY=500Mb
      - MEILI_HTTP_PAYLOAD_SIZE_LIMIT=10485760
    ports:
      - "127.0.0.1:7700:7700"
    volumes:
      - meilisearch-data:/meili_data
    networks:
      - backend
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  ##############################################################
  # 🧠 LAYER 5: AI BRAIN
  ##############################################################

  litellm:
    profiles:
      - llm
    image: ghcr.io/berriai/litellm:main-latest
    container_name: litellm
    restart: unless-stopped
    logging: *default-logging
    # Port 4000 internal — ai-router reaches it as http://litellm:4000
    # Exposed on host as 4000 (NOT 11434 — avoids collision with Ollama)
    ports:
      - "127.0.0.1:4000:4000"
    environment:
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - HF_TOKEN=${HF_TOKEN}
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY}
    volumes:
      - ./litellm_config.yaml:/app/config.yaml:ro
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    networks:
      - backend
    depends_on:
      ollama:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    logging: *default-logging
    entrypoint: >
      sh -c "ollama serve &
      sleep 8 &&
      ollama pull nomic-embed-text &&
      tail -f /dev/null"
    ports:
      - "127.0.0.1:11434:11434"
    volumes:
      - ollama-models:/root/.ollama
    networks:
      - backend
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_NUM_PARALLEL=2
      - OLLAMA_MAX_LOADED_MODELS=2
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ##############################################################
  # 🎨 LAYER 6: INTERNAL SEARCH — Perplexica
  # Internal only — no published ports
  ##############################################################

  perplexica:
    profiles:
      - perplexica
    build:
      context: ./backend/search-engine/perplexica
      dockerfile: Dockerfile
    container_name: perplexica
    restart: unless-stopped
    logging: *default-logging
    environment:
      - SEARXNG_API_URL=http://searxng:8080
      - OLLAMA_API_URL=http://ollama:11434
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - INTERNAL_ONLY=true
      - NEXT_PUBLIC_API_URL=http://ai-router:8000
    # Internal only — no published ports
    expose:
      - "3000"
    volumes:
      - perplexica-data:/app/data
      - ./configs/perplexica.toml:/app/config.toml:ro
    networks:
      - backend
    depends_on:
      searxng:
        condition: service_healthy
      ollama:
        condition: service_healthy
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  ##############################################################
  # 🎛️ LAYER 7: ORCHESTRATION — n8n
  ##############################################################

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    logging: *default-logging
    environment:
      - N8N_HOST=n8n.${DOMAIN}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - NODE_ENV=production
      - WEBHOOK_URL=https://n8n.${DOMAIN}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD}
      - DB_TYPE=sqlite
      - N8N_LOG_LEVEL=info
      - EXECUTIONS_PROCESS=main
      - N8N_ENCRYPTION_KEY=${N8N_ENCRYPTION_KEY}
    ports:
      - "127.0.0.1:5678:5678"
    volumes:
      - n8n-data:/home/node/.n8n
    networks:
      - backend
      - frontend
    depends_on:
      redis:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.n8n.rule=Host(`n8n.${DOMAIN}`)"
      - "traefik.http.routers.n8n.entrypoints=websecure"
      - "traefik.http.routers.n8n.tls.certresolver=myresolver"
      - "traefik.http.routers.n8n.middlewares=security-headers@docker"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  ##############################################################
  # 📊 LAYER 8: OBSERVABILITY
  ##############################################################

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    logging: *default-logging
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
      - "--storage.tsdb.retention.size=5GB"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
      - "--web.enable-lifecycle"
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./configs/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - monitoring
      - backend
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3

  grafana:
    profiles:
      - monitoring
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    logging: *default-logging
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_DOMAIN=grafana.${DOMAIN}
      - GF_SERVER_ROOT_URL=https://grafana.${DOMAIN}
      - GF_LOG_LEVEL=info
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
      - GF_AUTH_ANONYMOUS_ENABLED=false
    ports:
      # Changed from 3001 to 3050 — avoids collision with FRONTEND_URL (3001)
      - "127.0.0.1:3050:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./configs/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - monitoring
      - frontend
    depends_on:
      prometheus:
        condition: service_healthy
      loki:
        condition: service_healthy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.grafana.rule=Host(`grafana.${DOMAIN}`)"
      - "traefik.http.routers.grafana.entrypoints=websecure"
      - "traefik.http.routers.grafana.tls.certresolver=myresolver"
      - "traefik.http.services.grafana.loadbalancer.server.port=3000"
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    logging: *default-logging
    command: -config.file=/etc/loki/loki-config.yml
    ports:
      - "127.0.0.1:3100:3100"
    volumes:
      - ./configs/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - monitoring
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.3"
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/loki -config.file=/etc/loki/loki-config.yml -target=healthcheck || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ── Promtail: ships container logs → Loki ───────────────────
  promtail:
    profiles:
      - monitoring
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    logging: *default-logging
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./configs/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - promtail-positions:/positions
    networks:
      - monitoring
    depends_on:
      loki:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.2"
